<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Smart Expense Tracker</h1>

        <!-- Part 1: Dashboard Scoreboard -->
        <div class="dashboard">
            <div class="card budget-card">
                <h3>Total Budget</h3>
                <p id="total-budget">₹ 0</p>
            </div>
            <div class="card expense-card">
                <h3>Total Expense</h3>
                <p id="total-expense">₹ 0</p>
            </div>
            <div class="card balance-card">
                <h3>Available Balance</h3>
                <p id="available-balance">₹ 0</p>
            </div>
        </div>

        <!-- Budget Setup Input Form Section -->
        <div class="form-section budget-setup-section" style="margin-bottom: 20px;">
            <h2>Set Your Budget</h2>
            <div style="display: flex; gap: 10px;">
                <input type="number" id="budget-input" placeholder="Enter Total Budget (₹)" style="flex: 1; padding: 10px; border-radius: 5px; border: 1px solid #ddd;" required>
                <button type="button" id="set-budget-btn" style="padding: 10px 15px; background-color: #2ecc71; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">Set Budget</button>
            </div>
        </div>

        <!-- Part 2: Expense Input Form -->
        <div class="form-section">
            <h2>Add New Expense</h2>
            <form id="expense-form">
                <input type="text" id="expense-name" placeholder="Expense Name (e.g. Maggi)" required>
                <input type="number" id="expense-amount" placeholder="Amount (₹)" required>
                <input type="date" id="expense-date" required>
                <select id="expense-category">
                    <option value="Food">Food</option>
                    <option value="Bills">Bills</option>
                    <option value="Entertainment">Entertainment</option>
                    <option value="Other">Other</option>
                </select>
                <button type="submit">Add Expense (+)</button>
            </form>
        </div>

        <!-- Part 3: Expense History List -->
        <div class="history-section">
            <h2>Expense History</h2>

            <!-- Category Filter Selection -->
            <div class="filter-section" style="margin-bottom: 15px;">
                <label for="filter-category" style="font-weight: bold; margin-right: 10px;">Filter by Category:</label>
                <select id="filter-category" style="padding: 8px; border-radius: 5px; border: 1px solid #ddd;">
                    <option value="All">All Categories</option>
                    <option value="Food">Food</option>
                    <option value="Bills">Bills</option>
                    <option value="Entertainment">Entertainment</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            
            <ul id="expense-list">
                <!-- Dynamic entries will be rendered here -->
            </ul>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
